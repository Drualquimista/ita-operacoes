<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holding App | Sistema</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg: #09090b; --surface: #18181b; --surface-light: #27272a; --border: #3f3f46;
            --gold: #D4AF37; --gold-hover: #b5952f;
            --text: #f4f4f5; --text-muted: #a1a1aa;
            --danger: #ef4444; --success: #22c55e; --blue: #3b82f6;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .container { max-width: 500px; margin: auto; padding: 15px; padding-bottom: 90px; }

        /* Cabeçalho Global */
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        h1 { color: var(--gold); font-weight: 800; font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        #status { font-size: 0.7rem; font-weight: 600; padding: 4px 8px; border-radius: 8px; background: rgba(255,255,255,0.1); }

        /* Abas (Views) */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos do Dashboard */
        .card-destaque { background: linear-gradient(135deg, #1f1c0d, #18181b); border: 1px solid var(--gold); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .card-destaque span { font-size: 0.8rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .card-destaque h2 { margin: 5px 0 0 0; font-size: 2.2rem; color: #fff; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; }
        .dash-card span { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        .dash-card h3 { margin: 5px 0 0 0; font-size: 1.2rem; }
        .text-danger { color: var(--danger); } .text-success { color: var(--success); } .text-blue { color: var(--blue); }

        /* Estilos de Formulário */
        .box { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .box-title { margin-top: 0; font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; }
        .input-group { margin-bottom: 12px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        input:focus, select:focus { outline: none; border-color: var(--gold); }
        button.btn-primary { width: 100%; padding: 14px; background: var(--gold); color: #000; font-weight: 800; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        
        /* Lista de Estoque */
        .item-card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .item-card.zerado { opacity: 0.5; border-color: var(--danger); }
        .item-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .item-title { font-weight: 600; font-size: 1rem; margin: 0; }
        .item-cat { font-size: 0.7rem; color: var(--text-muted); }
        .item-finances { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 10px; margin-top: 5px;}
        .item-actions { display: flex; justify-content: space-between; align-items: center; background: var(--bg); padding: 5px 8px; border-radius: 8px; }
        .qty-controls { display: flex; align-items: center; gap: 10px; }
        .btn-icon { background: var(--surface-light); color: var(--text); width: 30px; height: 30px; border-radius: 6px; border: none; font-size: 1.2rem; cursor: pointer; }
        .qty-number { font-weight: 800; font-size: 1rem; min-width: 25px; text-align: center; }
        .btn-del { background: transparent; color: var(--danger); border: none; font-size: 0.8rem; cursor: pointer; }

        /* PDV - Vendas */
        .pdv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-vender { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .btn-vender:active { transform: scale(0.95); border-color: var(--gold); }
        .btn-vender h4 { margin: 0 0 5px 0; font-size: 1rem; color: var(--text); }
        .btn-vender .preco { font-weight: 800; color: var(--success); font-size: 1.1rem; }
        .btn-vender .estoque { font-size: 0.7rem; color: var(--text-muted); margin-top: 5px; display: block; }

        /* Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .nav-item { background: transparent; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.7rem; cursor: pointer; width: 33%; font-family: 'Inter', sans-serif;}
        .nav-item.active { color: var(--gold); font-weight: 800; }
        .nav-icon { font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>HOLDING BAR</h1>
            <div id="status">Buscando Servidor...</div>
        </header>

        <main id="view-dash" class="view active">
            <div class="card-destaque">
                <span>Dinheiro em Caixa (Vendas)</span>
                <h2 id="dash-caixa">R$ 0,00</h2>
            </div>
            <div class="dash-grid">
                <div class="dash-card">
                    <span>Custo do Estoque</span>
                    <h3 id="dash-custo" class="text-danger">R$ 0,00</h3>
                </div>
                <div class="dash-card">
                    <span>Lucro Potencial</span>
                    <h3 id="dash-lucro" class="text-success">R$ 0,00</h3>
                </div>
                <div class="dash-card">
                    <span>Itens Físicos</span>
                    <h3 id="dash-itens" class="text-blue">0 un</h3>
                </div>
            </div>
        </main>

        <main id="view-estoque" class="view">
            <div class="box">
                <h3 class="box-title">📦 Cadastrar / Comprar Item</h3>
                <form id="form-estoque">
                    <div class="input-group">
                        <label>Nome do Produto (Ex: RedBull, Copo Plástico)</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="cat">
                            <option>🍻 Bebidas pra Venda</option>
                            <option>🧊 Insumos (Gelo, Fruta, Xarope)</option>
                            <option>🍸 Vidraria & Estrutura</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <div class="input-group">
                            <label>Custo Unitário (R$)</label>
                            <input type="number" id="custo" step="0.01" required placeholder="Ex: 5.00">
                        </div>
                        <div class="input-group">
                            <label>Preço Venda (R$)</label>
                            <input type="number" id="preco_venda" step="0.01" placeholder="Opcional">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Quantidade Comprada</label>
                        <input type="number" id="qtd" required placeholder="Ex: 24">
                    </div>
                    <button type="submit" class="btn-primary">ADCIONAR AO ESTOQUE</button>
                </form>
            </div>
            
            <h3 style="font-size: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px;">Inventário Físico</h3>
            <div id="lista-estoque"></div>
        </main>

        <main id="view-vendas" class="view">
            <div class="box" style="text-align: center; margin-bottom: 20px;">
                <span style="font-size: 0.8rem; color: var(--text-muted);">Toque para registrar uma venda</span>
            </div>
            <div id="grid-pdv" class="pdv-grid"></div>
        </main>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="mudarAba('dash', this)">
            <span class="nav-icon">📊</span>
            <span>Resumo</span>
        </button>
        <button class="nav-item" onclick="mudarAba('estoque', this)">
            <span class="nav-icon">📦</span>
            <span>Estoque</span>
        </button>
        <button class="nav-item" onclick="mudarAba('vendas', this)">
            <span class="nav-icon">💰</span>
            <span>PDV</span>
        </button>
    </nav>

    <script>
        // ======= O SEU LINK DO TERMUX =======
        const API_URL = "https://d9de824738f218.lhr.life/sync";
        
        // Estrutura do Banco de Dados atualizada
        let bd = { estoque: [], caixa: 0 };

        function mudarAba(aba, elemento) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + aba).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            elemento.classList.add('active');
            
            renderizarTelas();
        }

        function formatarDinheiro(valor) {
            return Number(valor).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        async function sincronizar() {
            try {
                let res = await fetch(API_URL);
                if(res.ok) {
                    let serverData = await res.json();
                    
                    // Transição caso o Termux ainda tenha o formato antigo (lista simples)
                    if (Array.isArray(serverData)) {
                        bd = { estoque: serverData, caixa: 0 };
                    } else if (serverData.estoque) {
                        bd = serverData;
                    }

                    renderizarTelas();
                    setStatus("🟢 Online", "#22c55e", "rgba(34, 197, 94, 0.1)");
                }
            } catch(e) {
                setStatus("🔴 Offline...", "#ef4444", "rgba(239, 68, 68, 0.1)");
            }
        }

        function setStatus(texto, cor, bg) {
            const st = document.getElementById('status');
            st.innerText = texto; st.style.color = cor; st.style.backgroundColor = bg;
        }

        async function salvar() {
            renderizarTelas(); 
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bd)
                });
            } catch(e) {}
        }

        function renderizarTelas() {
            renderizarDashboard();
            renderizarEstoque();
            renderizarPDV();
        }

        function renderizarDashboard() {
            let custoTotal = 0;
            let lucroPotencial = 0;
            let itensFisicos = 0;

            bd.estoque.forEach(item => {
                let q = Number(item.qtd) || 0;
                let custo = Number(item.custo) || 0;
                let venda = Number(item.preco_venda) || 0;
                
                itensFisicos += q;
                custoTotal += (q * custo);
                if(venda > 0) {
                    lucroPotencial += (q * (venda - custo));
                }
            });

            document.getElementById('dash-caixa').innerText = formatarDinheiro(bd.caixa || 0);
            document.getElementById('dash-custo').innerText = formatarDinheiro(custoTotal);
            document.getElementById('dash-lucro').innerText = formatarDinheiro(lucroPotencial);
            document.getElementById('dash-itens').innerText = itensFisicos + " un";
        }

        function renderizarEstoque() {
            const div = document.getElementById('lista-estoque');
            div.innerHTML = '';
            
            if(bd.estoque.length === 0) {
                div.innerHTML = '<p style="text-align:center; color:var(--text-muted);">Nenhum item cadastrado.</p>';
                return;
            }

            bd.estoque.forEach((item, index) => {
                let q = Number(item.qtd) || 0;
                let custo = item.custo ? formatarDinheiro(item.custo) : "R$ 0,00";
                let venda = item.preco_venda ? formatarDinheiro(item.preco_venda) : "Não Vende";
                let zerado = q <= 0 ? 'zerado' : '';

                div.innerHTML += `
                    <div class="item-card ${zerado}">
                        <div class="item-header">
                            <div>
                                <p class="item-title">${item.nome}</p>
                                <span class="item-cat">${item.cat}</span>
                                <div class="item-finances">
                                    <span>Custo: ${custo}</span>
                                    <span style="color:var(--gold)">Venda: ${venda}</span>
                                </div>
                            </div>
                        </div>
                        <div class="item-actions">
                            <div class="qty-controls">
                                <button class="btn-icon" onclick="alterarEstoque(${index}, -1)">-</button>
                                <span class="qty-number">${q}</span>
                                <button class="btn-icon" onclick="alterarEstoque(${index}, 1)">+</button>
                            </div>
                            <button class="btn-del" onclick="deletar(${index})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderizarPDV() {
            const grid = document.getElementById('grid-pdv');
            grid.innerHTML = '';

            // Filtra só o que tem preço de venda e tem estoque
            let itensParaVender = bd.estoque.map((item, index) => ({...item, originalIndex: index}))
                                            .filter(i => Number(i.preco_venda) > 0);

            if(itensParaVender.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 2; text-align:center; color:var(--text-muted);">Nenhum produto cadastrado com Preço de Venda.</p>';
                return;
            }

            itensParaVender.forEach(item => {
                let q = Number(item.qtd) || 0;
                let opacidade = q <= 0 ? 'opacity: 0.4; pointer-events: none;' : '';
                
                grid.innerHTML += `
                    <div class="btn-vender" style="${opacidade}" onclick="venderProduto(${item.originalIndex})">
                        <h4>${item.nome}</h4>
                        <span class="preco">${formatarDinheiro(item.preco_venda)}</span>
                        <span class="estoque">${q} disp.</span>
                    </div>
                `;
            });
        }

        window.alterarEstoque = (index, valor) => {
            let atual = Number(bd.estoque[index].qtd) || 0;
            let novaQtd = atual + valor;
            if (novaQtd < 0) novaQtd = 0;
            bd.estoque[index].qtd = novaQtd;
            salvar();
        };

        window.venderProduto = (index) => {
            let item = bd.estoque[index];
            if(item.qtd > 0) {
                item.qtd -= 1; // Tira 1 do estoque
                bd.caixa += Number(item.preco_venda); // Põe dinheiro no caixa
                salvar();
            }
        };

        document.getElementById('form-estoque').onsubmit = (e) => {
            e.preventDefault();
            let novo = {
                nome: document.getElementById('nome').value,
                cat: document.getElementById('cat').value,
                custo: document.getElementById('custo').value,
                preco_venda: document.getElementById('preco_venda').value || null,
                qtd: document.getElementById('qtd').value
            };
            bd.estoque.push(novo);
            
            // Limpa form
            document.getElementById('nome').value = '';
            document.getElementById('custo').value = '';
            document.getElementById('preco_venda').value = '';
            document.getElementById('qtd').value = '';
            
            salvar();
        };

        window.deletar = (index) => {
            if(confirm("Deseja mesmo apagar este item?")) {
                bd.estoque.splice(index, 1);
                salvar();
            }
        };

        setInterval(sincronizar, 3000);
        sincronizar();
    </script>
</body>
</html>
