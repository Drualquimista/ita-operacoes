<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holding Bar 3.2 | GIGANTE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg: #09090b; --surface: #18181b; --border: #3f3f46;
            --gold: #D4AF37; --text: #f4f4f5; --text-muted: #a1a1aa;
            --danger: #ef4444; --success: #22c55e; --warning: #eab308;
        }

        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; margin: 0; padding: 0; 
            font-size: 18px; 
        }

        .container { max-width: 600px; margin: auto; padding: 20px; padding-bottom: 120px; }

        header { border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--gold); font-size: 1.5rem; font-weight: 900; margin: 0; }
        #status { font-size: 0.9rem; padding: 6px 12px; border-radius: 10px; background: rgba(255,255,255,0.1); font-weight: 700; }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Gigante */
        .card { background: var(--surface); border: 2px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        .dash-main { border: 2px solid var(--gold); text-align: center; }
        .dash-main span { font-size: 1rem; color: var(--gold); font-weight: 700; }
        .dash-main h2 { font-size: 3rem; margin: 10px 0; font-weight: 900; }
        
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .dash-sub { padding: 20px; background: #222; border-radius: 15px; border: 1px solid var(--border); }
        .dash-sub h4 { font-size: 1.4rem; margin: 5px 0 0 0; }

        /* Inputs e Botões GIGANTES */
        input, select { 
            width: 100%; padding: 20px; margin-bottom: 15px; 
            background: var(--bg); border: 2px solid var(--border); 
            border-radius: 15px; color: #fff; font-size: 1.2rem; 
            box-sizing: border-box; font-family: inherit;
        }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-gold { 
            background: var(--gold); color: #000; 
            padding: 25px; border: none; border-radius: 15px; 
            font-size: 1.3rem; font-weight: 900; width: 100%;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* Lista de Itens com botões fáceis de clicar */
        .item-row { 
            background: var(--surface); border: 2px solid var(--border); 
            padding: 20px; border-radius: 20px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .item-info b { font-size: 1.3rem; display: block; margin-bottom: 5px; }
        .qty-box { display: flex; align-items: center; gap: 20px; }
        .btn-qty { 
            background: var(--border); color: #fff; border: none; 
            width: 55px; height: 55px; border-radius: 15px; 
            font-size: 2rem; font-weight: 900; display: flex; align-items: center; justify-content: center;
        }

        /* PDV - Vendas */
        .pdv-grid { display: grid; grid-template-columns: 1fr; gap: 15px; } 
        .btn-venda { 
            background: var(--surface); border: 2px solid var(--border); 
            padding: 25px; border-radius: 20px; text-align: center; 
        }
        .btn-venda h4 { margin: 0; font-size: 1.4rem; }
        .btn-venda .val { color: var(--success); font-size: 1.8rem; font-weight: 900; display: block; margin: 10px 0; }

        /* Telas Vazias Anti-Susto */
        .empty-state {
            text-align: center; padding: 40px 20px; border: 2px dashed var(--border); 
            border-radius: 20px; color: var(--text-muted); font-weight: 700; margin-top: 20px;
        }

        /* Menu Inferior GIGANTE */
        .nav { 
            position: fixed; bottom: 0; width: 100%; 
            background: #000; border-top: 3px solid var(--border); 
            display: flex; padding: 15px 0; z-index: 100;
        }
        .nav-btn { 
            flex: 1; background: none; border: none; color: var(--text-muted); 
            display: flex; flex-direction: column; align-items: center; 
            font-size: 0.9rem; font-weight: 700; gap: 8px;
        }
        .nav-btn.active { color: var(--gold); }
        .nav-icon { font-size: 1.8rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HOLDING GESTÃO</h1>
            <div id="status">...</div>
        </header>

        <div id="v-dash" class="view active">
            <div class="card dash-main">
                <span>CAIXA ATUAL</span>
                <h2 id="d-caixa">R$ 0,00</h2>
            </div>
            <div class="dash-grid">
                <div class="dash-sub"><span>Custo</span><h4 id="d-custo" style="color:var(--danger)">R$ 0,00</h4></div>
                <div class="dash-sub"><span>Lucro</span><h4 id="d-lucro" style="color:var(--success)">R$ 0,00</h4></div>
            </div>
        </div>

        <div id="v-est" class="view">
            <div class="card">
                <input type="text" id="n" placeholder="NOME DO PRODUTO">
                <input type="number" id="c" placeholder="CUSTO (R$)">
                <input type="number" id="v" placeholder="VENDA (R$)">
                <input type="number" id="q" placeholder="QTD ATUAL">
                <input type="number" id="m" placeholder="ESTOQUE MÍNIMO">
                <button class="btn-gold" onclick="add()">SALVAR NO ESTOQUE</button>
            </div>
            <div id="lista-estoque"></div>
        </div>

        <div id="v-pdv" class="view">
            <div id="grid-pdv" class="pdv-grid"></div>
        </div>

        <div id="v-com" class="view">
            <div id="lista-compras"></div>
        </div>

        <div id="v-cfg" class="view">
            <div class="card">
                <h3 style="margin-top:0">CONEXÃO</h3>
                <input type="text" id="cfg-ip" placeholder="Link do Tailscale">
                <button class="btn-gold" onclick="salvarIP()">CONECTAR AGORA</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="tab('dash', this)"><span class="nav-icon">📊</span>Resumo</button>
        <button class="nav-btn" onclick="tab('est', this)"><span class="nav-icon">📦</span>Estoque</button>
        <button class="nav-btn" onclick="tab('pdv', this)"><span class="nav-icon">💰</span>PDV</button>
        <button class="nav-btn" onclick="tab('com', this)"><span class="nav-icon">🛒</span>Compras</button>
        <button class="nav-btn" onclick="tab('cfg', this)"><span class="nav-icon">⚙️</span>Config</button>
    </nav>

    <script>
        let api = localStorage.getItem('api') || "http://100.78.40.23:3001/sync";
        document.getElementById('cfg-ip').value = api;
        let bd = { estoque: [], caixa: 0 };

        function tab(t, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            render();
        }

        async function sync() {
            try {
                let r = await fetch(api);
                if(r.ok) { 
                    let d = await r.json(); 
                    bd = d.estoque ? d : { estoque: d, caixa: 0 };
                    render();
                    document.getElementById('status').innerText = "🟢 ONLINE";
                }
            } catch(e) { document.getElementById('status').innerText = "🔴 OFFLINE"; }
        }

        async function save() {
            render();
            try { await fetch(api, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bd) }); } catch(e) {}
        }

        function add() {
            let n = document.getElementById('n').value;
            if(!n) { alert("DIGITE O NOME DO PRODUTO!"); return; }
            bd.estoque.push({ 
                nome: n, 
                custo: Number(document.getElementById('c').value) || 0, 
                venda: Number(document.getElementById('v').value) || 0, 
                qtd: Number(document.getElementById('q').value) || 0, 
                min: Number(document.getElementById('m').value) || 0 
            });
            document.getElementById('n').value = ''; 
            document.getElementById('c').value = ''; 
            document.getElementById('v').value = ''; 
            document.getElementById('q').value = ''; 
            document.getElementById('m').value = ''; 
            save();
        }

        function render() {
            // Dashboard
            let cTotal = 0, lTotal = 0;
            bd.estoque.forEach(i => { cTotal += (i.qtd * i.custo); if(i.venda > 0) lTotal += (i.qtd * (i.venda - i.custo)); });
            document.getElementById('d-caixa').innerText = "R$ " + bd.caixa.toFixed(2);
            document.getElementById('d-custo').innerText = "R$ " + cTotal.toFixed(2);
            document.getElementById('d-lucro').innerText = "R$ " + lTotal.toFixed(2);

            // Estoque
            let listE = document.getElementById('lista-estoque'); listE.innerHTML = '';
            if(bd.estoque.length === 0) {
                listE.innerHTML = '<div class="empty-state">Estoque Vazio.<br>Adicione produtos acima.</div>';
            } else {
                bd.estoque.forEach((i, idx) => {
                    listE.innerHTML += `<div class="item-row"><div class="item-info"><b>${i.nome}</b><small>Custo: R$${i.custo}</small></div><div class="qty-box"><button class="btn-qty" onclick="upd(${idx},-1)">-</button><span style="font-weight:900;font-size:1.5rem">${i.qtd}</span><button class="btn-qty" onclick="upd(${idx},1)">+</button></div></div>`;
                });
            }

            // PDV
            let listP = document.getElementById('grid-pdv'); listP.innerHTML = '';
            let temVenda = false;
            bd.estoque.forEach((i, idx) => {
                if(i.venda > 0) {
                    temVenda = true;
                    listP.innerHTML += `<div class="btn-venda" onclick="sell(${idx})"><h4>${i.nome}</h4><span class="val">R$ ${i.venda.toFixed(2)}</span><small>ESTOQUE: ${i.qtd}</small></div>`;
                }
            });
            if(!temVenda) {
                listP.innerHTML = '<div class="empty-state">Nenhum produto cadastrado com preço de venda.</div>';
            }

            // Compras
            let listC = document.getElementById('lista-compras'); listC.innerHTML = '';
            let precisaComprar = false;
            bd.estoque.forEach(i => {
                if(i.min > 0 && i.qtd <= i.min) {
                    precisaComprar = true;
                    listC.innerHTML += `<div class="item-row" style="border-left:8px solid var(--warning)"><div><b>${i.nome}</b><br>ABAIXO DO MÍNIMO</div><h2 style="color:var(--warning);margin:0">+${i.min - i.qtd + 1}</h2></div>`;
                }
            });
            if(!precisaComprar) {
                listC.innerHTML = '<div class="empty-state" style="color: var(--success);">Tudo certo no estoque!<br>Nenhuma reposição urgente.</div>';
            }
        }

        function upd(i, v) { bd.estoque[i].qtd += v; if(bd.estoque[i].qtd < 0) bd.estoque[i].qtd = 0; save(); }
        function sell(i) { if(bd.estoque[i].qtd > 0) { bd.estoque[i].qtd--; bd.caixa += bd.estoque[i].venda; save(); } }
        function salvarIP() { api = document.getElementById('cfg-ip').value; localStorage.setItem('api', api); sync(); }

        setInterval(sync, 3000); sync();
    </script>
</body>
</html>
