<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holding Bar | Gestão</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg: #09090b; --surface: #18181b; --border: #3f3f46;
            --gold: #D4AF37; --text: #f4f4f5; --text-muted: #a1a1aa;
            --danger: #ef4444; --success: #22c55e; --warning: #eab308;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: auto; padding: 15px; padding-bottom: 100px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: var(--gold); font-size: 1.1rem; font-weight: 800; margin: 0; }
        #status { font-size: 0.65rem; padding: 4px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); }
        .view { display: none; animation: fadeIn 0.2s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .dash-main { text-align: center; border: 1px solid var(--gold); }
        .dash-main h2 { font-size: 2rem; margin: 5px 0; }
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .dash-sub { padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
        .dash-sub span { font-size: 0.7rem; color: var(--text-muted); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; }
        .item-row { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .pdv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-venda { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 12px; text-align: center; }
        .btn-venda h4 { margin: 0; font-size: 0.9rem; }
        .btn-venda .val { color: var(--success); font-weight: 800; display: block; margin: 5px 0; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; border-top: 1px solid var(--border); display: flex; padding: 10px 0; }
        .nav-btn { flex: 1; background: none; border: none; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; padding: 0; }
        .nav-btn.active { color: var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>HOLDING BAR 3.0</h1><div id="status">Buscando...</div></header>

        <div id="v-dash" class="view active">
            <div class="card dash-main"><span>Dinheiro em Caixa</span><h2 id="d-caixa">R$ 0,00</h2></div>
            <div class="dash-grid">
                <div class="dash-sub"><span>Custo Estoque</span><h4 id="d-custo" style="color:var(--danger)">R$ 0,00</h4></div>
                <div class="dash-sub"><span>Lucro Estimado</span><h4 id="d-lucro" style="color:var(--success)">R$ 0,00</h4></div>
            </div>
        </div>

        <div id="v-est" class="view">
            <div class="card">
                <input type="text" id="n" placeholder="Nome (Ex: Heineken)">
                <div style="display:flex; gap:5px">
                    <input type="number" id="c" placeholder="Custo R$">
                    <input type="number" id="v" placeholder="Venda R$">
                </div>
                <div style="display:flex; gap:5px">
                    <input type="number" id="q" placeholder="Qtd">
                    <input type="number" id="m" placeholder="Mínimo">
                </div>
                <button class="btn-gold" onclick="add()">ADICIONAR ITEM</button>
            </div>
            <div id="lista-estoque"></div>
        </div>

        <div id="v-pdv" class="view"><div id="grid-pdv" class="pdv-grid"></div></div>

        <div id="v-com" class="view"><div id="lista-compras"></div></div>

        <div id="v-cfg" class="view">
            <div class="card">
                <h3>⚙️ Configurações</h3>
                <label style="font-size: 0.7rem;">IP do Termux (Tailscale):</label>
                <input type="text" id="cfg-ip" placeholder="http://100.x.x.x:3000">
                <button class="btn-gold" onclick="salvarIP()">SALVAR CONEXÃO</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="tab('dash', this)"><span>📊</span>Resumo</button>
        <button class="nav-btn" onclick="tab('est', this)"><span>📦</span>Estoque</button>
        <button class="nav-btn" onclick="tab('pdv', this)"><span>💰</span>Vendas</button>
        <button class="nav-btn" onclick="tab('com', this)"><span>🛒</span>Compras</button>
        <button class="nav-btn" onclick="tab('cfg', this)"><span>⚙️</span>Config</button>
    </nav>

    <script>
        let api = localStorage.getItem('api') || "http://100.78.40.23:3000/sync";
        document.getElementById('cfg-ip').value = api;
        let bd = { estoque: [], caixa: 0 };

        function salvarIP() { 
            api = document.getElementById('cfg-ip').value; 
            localStorage.setItem('api', api); 
            alert("Conexão atualizada!"); 
            sync(); 
        }

        function tab(t, b) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('v-'+t).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            b.classList.add('active');
            render();
        }

        async function sync() {
            try {
                let r = await fetch(api);
                if(r.ok) { 
                    let d = await r.json(); 
                    bd = d.estoque ? d : { estoque: d, caixa: 0 };
                    render();
                    document.getElementById('status').innerText = "🟢 Online";
                }
            } catch(e) { document.getElementById('status').innerText = "🔴 Offline"; }
        }

        async function save() {
            render();
            try { await fetch(api, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bd) }); } catch(e) {}
        }

        function add() {
            let item = { 
                nome: document.getElementById('n').value, 
                custo: Number(document.getElementById('c').value), 
                venda: Number(document.getElementById('v').value), 
                qtd: Number(document.getElementById('q').value), 
                min: Number(document.getElementById('m').value) 
            };
            if(!item.nome) return;
            bd.estoque.push(item);
            document.getElementById('n').value = ''; document.getElementById('c').value = ''; document.getElementById('v').value = ''; document.getElementById('q').value = ''; document.getElementById('m').value = '';
            save();
        }

        function render() {
            // Dashboard
            let cTotal = 0, lTotal = 0;
            bd.estoque.forEach(i => { cTotal += (i.qtd * i.custo); if(i.venda > 0) lTotal += (i.qtd * (i.venda - i.custo)); });
            document.getElementById('d-caixa').innerText = "R$ " + bd.caixa.toFixed(2);
            document.getElementById('d-custo').innerText = "R$ " + cTotal.toFixed(2);
            document.getElementById('d-lucro').innerText = "R$ " + lTotal.toFixed(2);

            // Estoque
            let listE = document.getElementById('lista-estoque'); listE.innerHTML = '';
            bd.estoque.forEach((i, idx) => {
                listE.innerHTML += `<div class="item-row"><div><b>${i.nome}</b><br><small>${i.qtd} un</small></div><div><button style="width:30px;padding:5px" onclick="upd(${idx},-1)">-</button> ${i.qtd} <button style="width:30px;padding:5px" onclick="upd(${idx},1)">+</button></div></div>`;
            });

            // PDV
            let listP = document.getElementById('grid-pdv'); listP.innerHTML = '';
            bd.estoque.forEach((i, idx) => {
                if(i.venda > 0) listP.innerHTML += `<div class="btn-venda" onclick="sell(${idx})"><h4>${i.nome}</h4><span class="val">R$ ${i.venda.toFixed(2)}</span><small>${i.qtd} disp.</small></div>`;
            });

            // Compras
            let listC = document.getElementById('lista-compras'); listC.innerHTML = '';
            bd.estoque.forEach(i => {
                if(i.min > 0 && i.qtd <= i.min) listC.innerHTML += `<div class="item-row" style="border-left:4px solid var(--warning)"><b>${i.nome}</b> <span>Faltam ${i.min - i.qtd + 1} p/ meta</span></div>`;
            });
        }

        function upd(i, v) { bd.estoque[i].qtd += v; if(bd.estoque[i].qtd < 0) bd.estoque[i].qtd = 0; save(); }
        function sell(i) { if(bd.estoque[i].qtd > 0) { bd.estoque[i].qtd--; bd.caixa += bd.estoque[i].venda; save(); } }

        setInterval(sync, 3000); sync();
    </script>
</body>
</html>
