<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding | Termux Sync</title>
    <style>
        :root { --bg: #050505; --gold: #D4AF37; --text: #eee; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; }
        input, select { background: #111; color: #fff; border: 1px solid #333; }
        button { background: var(--gold); color: #000; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        .item { background: #111; padding: 15px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .del { background: transparent; color: #ff3333; width: auto; padding: 5px 15px; margin: 0; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h2 style="color: var(--gold); text-align: center; letter-spacing: 2px;">HOLDING OPERAÇÕES</h2>
    <div id="status" style="text-align: center; color: #D4AF37; font-size: 0.8rem; margin-bottom: 20px;">Sincronizando com Termux...</div>

    <form id="form">
        <input type="text" id="nome" placeholder="Ex: Whisky, Gelo, Copos..." required>
        <select id="cat">
            <option>🍹 Insumos & Bebidas</option>
            <option>🍸 Vidraria & Balcão</option>
            <option>💸 Caixa & Financeiro</option>
            <option>🛡️ Staff & Segurança</option>
        </select>
        <button type="submit">ADICIONAR ITEM</button>
    </form>
    <div id="lista" style="margin-top: 20px;"></div>

    <script>
        // O SEU LINK JÁ ESTÁ AQUI, NÃO MEXA EM NADA
        const API_URL = "https://1e647256767f51.lhr.life/sync";

        let dados = [];

        async function sincronizar() {
            try {
                let res = await fetch(API_URL);
                if(res.ok) {
                    dados = await res.json();
                    renderizar();
                    document.getElementById('status').innerText = "🟢 Sincronizado com Termux do Dru";
                    document.getElementById('status').style.color = "#4caf50";
                }
            } catch(e) {
                document.getElementById('status').innerText = "🔴 Tentando conectar com Termux...";
                document.getElementById('status').style.color = "#ff3333";
            }
        }

        async function salvarEEnviar(novosDados) {
            dados = novosDados;
            renderizar(); 
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
            } catch(e) {}
        }

        function renderizar() {
            const div = document.getElementById('lista');
            div.innerHTML = '';
            dados.forEach((item, index) => {
                div.innerHTML += `
                    <div class="item">
                        <span style="flex:1;"><b>${item.cat}</b><br>${item.nome}</span>
                        <button class="del" onclick="deletar(${index})">✖</button>
                    </div>
                `;
            });
        }

        document.getElementById('form').onsubmit = (e) => {
            e.preventDefault();
            let novo = {
                nome: document.getElementById('nome').value,
                cat: document.getElementById('cat').value
            };
            let novosDados = [...dados, novo];
            document.getElementById('nome').value = '';
            salvarEEnviar(novosDados);
        };

        window.deletar = (index) => {
            let novosDados = dados.filter((_, i) => i !== index);
            salvarEEnviar(novosDados);
        };

        setInterval(sincronizar, 3000);
        sincronizar();
    </script>
</body>
</html>
