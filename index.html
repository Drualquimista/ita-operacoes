<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holding Vault | Sincronizado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --bg-color: #050505; --surface: #111; --gold: #D4AF37; --text: #eee; --border: #222; }
        body { background: var(--bg-color); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; padding: 20px; display: none; }
        #login { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100vh; }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
        button { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .category-title { color: var(--gold); font-size: 0.9rem; text-transform: uppercase; border-bottom: 1px solid var(--gold); margin: 20px 0 10px; }
        .item { display: flex; justify-content: space-between; background: var(--surface); padding: 12px; border-radius: 8px; margin-bottom: 5px; border: 1px solid var(--border); }
        .checked { opacity: 0.4; text-decoration: line-through; }
        .status-cloud { font-size: 0.7rem; text-align: center; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login">
        <h1 style="color: var(--gold); letter-spacing: 3px;">HOLDING VAULT</h1>
        <input type="password" id="passkey" placeholder="Código de Acesso (1966)">
        <button onclick="unlock()">ENTRAR E SINCRONIZAR</button>
    </div>

    <div class="container" id="app">
        <h2 style="text-align: center; color: var(--gold);">Setup Partilhado</h2>
        <div id="status" class="status-cloud">Conectado à Nuvem Segura</div>
        
        <form id="add-form" style="margin-top: 20px;">
            <input type="text" id="name" placeholder="Item (ex: Gin, Gelo, Caixa...)" required>
            <select id="cat">
                <option value="🍹 Insumos & Bebidas">🍹 Insumos & Bebidas</option>
                <option value="🍸 Vidraria & Balcão">🍸 Vidraria & Balcão</option>
                <option value="🛡️ Staff & Segurança">🛡️ Staff & Segurança</option>
                <option value="💸 Caixa & Financeiro">💸 Caixa & Financeiro</option>
            </select>
            <button type="submit">ADICIONAR AO CLOUD</button>
        </form>

        <div id="list"></div>
        <button onclick="syncData()" style="margin-top: 20px; background: #222; color: #fff;">ATUALIZAR AGORA 🔄</button>
    </div>

    <script>
        let VAULT_KEY = "";
        const CLOUD_URL = "https://keyvalue.xyz/v1/ita-dru-holding-v1"; // Túnel de Sincronização

        async function unlock() {
            const pin = document.getElementById('passkey').value;
            if(pin === "1966") {
                VAULT_KEY = pin;
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                await syncData();
                // Sincronização Automática a cada 10 segundos
                setInterval(syncData, 10000);
            } else { alert("Acesso Negado."); }
        }

        // Criptografar e Enviar para a Nuvem
        async function saveToCloud(data) {
            const encrypted = CryptoJS.AES.encrypt(JSON.stringify(data), VAULT_KEY).toString();
            await fetch(CLOUD_URL, { method: 'POST', body: encrypted });
            document.getElementById('status').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
        }

        // Descriptografar e Baixar da Nuvem
        async function syncData() {
            try {
                const response = await fetch(CLOUD_URL);
                const encryptedData = await response.text();
                if(encryptedData) {
                    const bytes = CryptoJS.AES.decrypt(encryptedData, VAULT_KEY);
                    const decrypted = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
                    render(decrypted);
                }
            } catch(e) { console.log("Vault novo ou vazio."); }
        }

        function render(items) {
            const listDiv = document.getElementById('list');
            listDiv.innerHTML = '';
            const cats = [...new Set(items.map(i => i.category))];
            cats.forEach(c => {
                const html = `<div class="category-title">${c}</div>`;
                listDiv.insertAdjacentHTML('beforeend', html);
                items.filter(i => i.category === c).forEach((item, idx) => {
                    const itemHtml = `<div class="item ${item.checked ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
                        <span>${item.name}</span>
                        <button onclick="deleteItem('${item.id}'); event.stopPropagation();" style="width:auto; background:none; color:red;">✖</button>
                    </div>`;
                    listDiv.insertAdjacentHTML('beforeend', itemHtml);
                });
            });
            window.currentItems = items;
        }

        document.getElementById('add-form').onsubmit = async (e) => {
            e.preventDefault();
            const newItem = {
                id: Date.now().toString(),
                name: document.getElementById('name').value,
                category: document.getElementById('cat').value,
                checked: false
            };
            const list = window.currentItems || [];
            list.push(newItem);
            await saveToCloud(list);
            render(list);
            document.getElementById('name').value = '';
        };

        window.toggleItem = async (id) => {
            const list = window.currentItems.map(i => i.id === id ? {...i, checked: !i.checked} : i);
            await saveToCloud(list);
            render(list);
        };

        window.deleteItem = async (id) => {
            const list = window.currentItems.filter(i => i.id !== id);
            await saveToCloud(list);
            render(list);
        };
    }
    </script>
</body>
</html>
